map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream gray_next {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream gray_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name gray.alignment.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gray.alignment.id;

    ssl_certificate /etc/letsencrypt/live/gray.alignment.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gray.alignment.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location ^~ /api/backend/ {
        proxy_pass http://gray_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }

    location /_next/static/ {
        alias /home/ubuntu/gray/.next/static/;
        expires 1y;
        access_log off;
    }

    location / {
        proxy_pass http://gray_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
