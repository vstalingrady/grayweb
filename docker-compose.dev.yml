# Dev overlay for development.
# Default ports mirror production (3000/8000). If you need to run alongside prod
# on the same server, change these to alternate ports.
# Manual usage (server): docker compose -p gray-dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  frontend:
    ports:
      - "3000:3000"

  backend:
    ports:
      - "8001:8000"
    environment:
      - SQLITE_DB_PATH=/app/data/users-dev.db
    volumes:
      - ./data-dev:/app/data
      - ./backend/media_uploads-dev:/app/media_uploads

  worker:
    environment:
      - SQLITE_DB_PATH=/app/data/users-dev.db
    volumes:
      - ./data-dev:/app/data

  redis:
    ports:
      - "6380:6379"
