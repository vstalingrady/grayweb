# Dev overlay for running alongside production on the same server.
# Manual usage (server): docker compose -p gray-dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  frontend:
    ports:
      - "3001:3000"

  backend:
    ports:
      - "8001:8000"
    environment:
      - SQLITE_DB_PATH=/app/data/users-dev.db
    volumes:
      - ./data-dev:/app/data
      - ./backend/media_uploads-dev:/app/media_uploads

  worker:
    environment:
      - SQLITE_DB_PATH=/app/data/users-dev.db
    volumes:
      - ./data-dev:/app/data

  redis:
    ports:
      - "6380:6379"
