# Staging/Dev overlay for running alongside production on the same server.
# Usage (server): docker compose -p gray-dev -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-vstalingrady/gray}/gray-frontend:dev
    ports:
      - "3001:3000"

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-vstalingrady/gray}/gray-backend:dev
    ports:
      - "8001:8000"
    environment:
      - SQLITE_DB_PATH=/app/data/users-dev.db
    volumes:
      - ./data-dev:/app/data
      - ./backend/media_uploads-dev:/app/media_uploads

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-vstalingrady/gray}/gray-backend:dev
    environment:
      - SQLITE_DB_PATH=/app/data/users-dev.db
    volumes:
      - ./data-dev:/app/data

  redis:
    ports:
      - "6380:6379"
